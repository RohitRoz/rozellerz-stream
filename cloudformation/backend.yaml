AWSTemplateFormatVersion: '2010-09-09'
Description: Backend stack. DynamoDB state table, Lambda handler, API Gateway with CORS.

Parameters:
  StageName:
    Type: String
    Default: live
    Description: API stage name

Resources:

  StreamStateTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: rozelle-stream-state
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      SSESpecification:
        SSEEnabled: true

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: rozelle-stream-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoStreamState
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt StreamStateTable.Arn

  StreamStateLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: rozelle-stream-state
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code: ../lambda
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          TABLE_NAME: !Ref StreamStateTable

  StreamApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: rozelle-stream-api
      Description: State API
      EndpointConfiguration:
        Types: [EDGE]

  StateResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref StreamApi
      ParentId: !GetAtt StreamApi.RootResourceId
      PathPart: state

  GetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref StreamApi
      ResourceId: !Ref StateResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations
          - LambdaArn: !GetAtt StreamStateLambda.Arn

  PutMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref StreamApi
      ResourceId: !Ref StateResource
      HttpMethod: PUT
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations
          - LambdaArn: !GetAtt StreamStateLambda.Arn

  OptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref StreamApi
      ResourceId: !Ref StateResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations
          - LambdaArn: !GetAtt StreamStateLambda.Arn

  LambdaApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt StreamStateLambda.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${StreamApi}/*/*/state

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - GetMethod
      - PutMethod
      - OptionsMethod
    Properties:
      RestApiId: !Ref StreamApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref StreamApi
      DeploymentId: !Ref ApiDeployment
      StageName: !Ref StageName

Outputs:
  ApiUrl:
    Description: API endpoint
    Value: !Sub https://${StreamApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/state
    Export:
      Name: !Sub ${AWS::StackName}-ApiUrl

  LambdaArn:
    Description: Lambda ARN
    Value: !GetAtt StreamStateLambda.Arn
    Export:
      Name: !Sub ${AWS::StackName}-LambdaArn

  TableName:
    Description: Table name
    Value: !Ref StreamStateTable
    Export:
      Name: !Sub ${AWS::StackName}-TableName
