name: Deploy Rozelle Stream

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'static/**'
      - 'lambda/**'
      - 'cloudformation/**'

env:
  AWS_REGION: us-east-1
  BACKEND_STACK: rozelle-stream-backend
  ARTIFACTS_BUCKET: rozelle-stream-artifacts-${{ vars.AWS_ACCOUNT_ID }}
  PROD_BUCKET: rozellerz.com
  PROD_DIST_ID: E1DASKPD203KZ1

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      static:  ${{ steps.filter.outputs.static }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'lambda/**'
              - 'cloudformation/backend.yaml'
            static:
              - 'static/**'

  deploy-backend:
    name: Deploy Backend Stack
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Cleanup conflicting resources
        run: |
          aws dynamodb delete-table --table-name rozelle-stream-state 2>/dev/null || true
          aws dynamodb wait table-not-exists --table-name rozelle-stream-state 2>/dev/null || true

      - name: Ensure artifacts bucket exists
        run: |
          if ! aws s3 ls "s3://${{ env.ARTIFACTS_BUCKET }}" 2>/dev/null; then
            aws s3 mb "s3://${{ env.ARTIFACTS_BUCKET }}" --region ${{ env.AWS_REGION }}
            aws s3api put-bucket-versioning \
              --bucket "${{ env.ARTIFACTS_BUCKET }}" \
              --versioning-configuration Status=Enabled
            aws s3api put-public-access-block \
              --bucket "${{ env.ARTIFACTS_BUCKET }}" \
              --public-access-block-configuration \
              BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
          fi

      - name: Package CloudFormation
        run: |
          aws cloudformation package \
            --template-file cloudformation/backend.yaml \
            --s3-bucket "${{ env.ARTIFACTS_BUCKET }}" \
            --s3-prefix "cfn-artifacts/$(date +%Y%m%d-%H%M%S)" \
            --output-template-file packaged-backend.yaml

      - name: Deploy backend stack
        run: |
          aws cloudformation deploy \
            --template-file packaged-backend.yaml \
            --stack-name "${{ env.BACKEND_STACK }}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides StageName=live \
            --no-fail-on-empty-changeset \
            --tags Project=rozelle-stream DeployedBy=github-actions Commit=${{ github.sha }}

      - name: Seed default state if table is empty
        run: |
          COUNT=$(aws dynamodb scan --table-name rozelle-stream-state \
            --select COUNT --query "Count" --output text)
          if [ "$COUNT" = "0" ]; then
            aws dynamodb put-item --table-name rozelle-stream-state --item '{
              "id":                {"S": "current"},
              "currentSegment":    {"S": "Beat Making Session"},
              "currentStatus":     {"S": "ON NOW"},
              "comingUp":          {"S": "Stand-Up Comedy Set"},
              "latestProject":     {"S": "New EP - Coming Soon"},
              "latestProjectMeta": {"S": "2026"}
            }'
          fi

  deploy-static:
    name: Deploy Static Files
    runs-on: ubuntu-latest
    needs: [changes, deploy-backend]
    if: |
      always() &&
      (needs.changes.outputs.static == 'true' ||
       needs.deploy-backend.result == 'success' ||
       github.event_name == 'workflow_dispatch')
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get API URL
        id: outputs
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.BACKEND_STACK }}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

      - name: Inject API URL into static files
        run: |
          API_URL="${{ steps.outputs.outputs.api_url }}"
          sed -i "s|YOUR_API_GATEWAY_URL/state|$API_URL|g" static/streamadmin/index.html
          sed -i "s|YOUR_API_GATEWAY_URL/state|$API_URL|g" static/overlay.html

      - name: Sync HTML to prod bucket (no-cache)
        run: |
          aws s3 sync static/ "s3://${{ env.PROD_BUCKET }}/" \
            --exclude "*" --include "*.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Sync assets to prod bucket (long-cache)
        run: |
          aws s3 sync static/ "s3://${{ env.PROD_BUCKET }}/" \
            --exclude "*.html" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Invalidate CloudFront cache
        run: |
          INV_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${{ env.PROD_DIST_ID }}" \
            --paths "/streamadmin" "/streamadmin/*" "/overlay.html" \
            --query "Invalidation.Id" --output text)
          aws cloudfront wait invalidation-completed \
            --distribution-id "${{ env.PROD_DIST_ID }}" --id "$INV_ID"
          echo "Live at: https://rozellerz.com/streamadmin"

      - name: Summary
        run: |
          echo "## Rozelle Stream Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Stream Admin | https://rozellerz.com/streamadmin |" >> $GITHUB_STEP_SUMMARY
          echo "| Overlay | https://rozellerz.com/overlay.html |" >> $GITHUB_STEP_SUMMARY
          echo "| API | ${{ steps.outputs.outputs.api_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
